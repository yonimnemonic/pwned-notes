<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Port Attack Cheatsheet — Pwned Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --bg2: #0f1420;
      --bg3: #141926;
      --card: #111827;
      --card2: #1a2235;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.08);
      --green-border: rgba(74,222,128,0.25);
      --green-glow: 0 0 20px rgba(74,222,128,0.15);
      --amber: #fbbf24;
      --coral: #f87171;
      --blue: #60a5fa;
      --purple: #c084fc;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-faint: #4b5563;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,23,0.95);
      backdrop-filter: blur(12px);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 0;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--green-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--green-dim);
      font-family: var(--mono);
      font-size: 20px;
      color: var(--green);
      box-shadow: var(--green-glow);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-dim);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .header-meta {
      margin-left: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid;
    }

    .meta-badge.green { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
    .meta-badge.dim { color: var(--text-dim); border-color: var(--border2); background: rgba(255,255,255,0.03); }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 16px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--text-faint); }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
    .filter-btn.active-all { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
    .filter-btn.active-win { color: var(--blue); border-color: rgba(96,165,250,.3); background: rgba(96,165,250,.08); }
    .filter-btn.active-lin { color: var(--amber); border-color: rgba(251,191,36,.3); background: rgba(251,191,36,.08); }
    .filter-btn.active-web { color: var(--purple); border-color: rgba(192,132,252,.3); background: rgba(192,132,252,.08); }
    .filter-btn.active-db  { color: var(--coral); border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }

    /* ── STATS BAR ── */
    .stats-bar {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 1.25rem;
    }

    .stats-bar span { color: var(--green); }

    /* ── GRID ── */
    .port-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 10px;
    }

    /* ── PORT CARD ── */
    .port-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }

    .port-card:hover { border-color: rgba(74,222,128,.2); }
    .port-card.expanded { border-color: rgba(74,222,128,.3); box-shadow: 0 0 0 1px rgba(74,222,128,.1); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .port-badge {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
      min-width: 64px;
      letter-spacing: -0.03em;
    }

    .card-header-info { flex: 1 }

    .card-header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .port-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .port-proto {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
    }

    .port-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .ptag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 3px;
      border: 1px solid;
      white-space: nowrap;
    }

    .ptag-g { color: var(--green); border-color: rgba(74,222,128,.25); background: rgba(74,222,128,.08); }
    .ptag-r { color: var(--coral); border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.08); }
    .ptag-a { color: var(--amber); border-color: rgba(251,191,36,.25); background: rgba(251,191,36,.08); }
    .ptag-b { color: var(--blue); border-color: rgba(96,165,250,.25); background: rgba(96,165,250,.08); }
    .ptag-p { color: var(--purple); border-color: rgba(192,132,252,.25); background: rgba(192,132,252,.08); }

    .chevron {
      font-size: 10px;
      color: var(--text-faint);
      transition: transform .2s;
      flex-shrink: 0;
    }

    .port-card.expanded .chevron { transform: rotate(90deg); color: var(--green); }

    /* ── CARD BODY ── */
    .card-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
    }

    .port-card.expanded .card-body { display: block; }

    /* Attacks list */
    .atk-title {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 8px;
    }

    .atk-item {
      display: flex;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 5px;
      align-items: flex-start;
    }

    .atk-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      margin-top: 6px;
    }

    /* Code blocks */
    .cmd-block {
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 8px;
      margin-top: 12px;
      overflow: hidden;
    }

    .cmd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      background: rgba(255,255,255,.02);
    }

    .cmd-dots { display: flex; gap: 5px; }
    .cmd-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.1);
    }

    .cmd-label-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .copy-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-faint);
      cursor: pointer;
      transition: all .15s;
    }

    .copy-btn:hover { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }

    pre {
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      overflow-x: auto;
    }

    .kw { color: var(--coral); }
    .fl { color: var(--blue); }
    .vl { color: var(--amber); }
    .cm { color: #4b5563; font-style: italic; }
    .gn { color: var(--green); }

    /* Note box */
    .note-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(251,191,36,.04);
      border-left: 3px solid rgba(251,191,36,.4);
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .note-box strong { color: var(--amber); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 13px;
    }

    .empty-state::before {
      content: '// no results';
      display: block;
      font-size: 20px;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
    }

    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      main { padding: 1rem; }
      .header-inner { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .header-meta { margin-left: 0; }
      .port-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">⚡</div>
    <div class="header-text">
      <h1>Port Attack Cheatsheet</h1>
      <p>// vectores de ataque por protocolo — HTB &amp; pentesting</p>
    </div>
    <div class="header-meta">
      <span class="meta-badge green">16 puertos</span>
      <span class="meta-badge dim">HTB ready</span>
      <span class="meta-badge dim">v1.0</span>
    </div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" class="search-input" placeholder="Buscar puerto, servicio o técnica..." oninput="doSearch(this.value)">
    </div>
    <div class="filters">
      <button class="filter-btn active-all" data-cat="all" onclick="doFilter('all',this)">Todos</button>
      <button class="filter-btn" data-cat="win" onclick="doFilter('win',this)">Windows</button>
      <button class="filter-btn" data-cat="lin" onclick="doFilter('lin',this)">Linux</button>
      <button class="filter-btn" data-cat="web" onclick="doFilter('web',this)">Web</button>
      <button class="filter-btn" data-cat="db"  onclick="doFilter('db',this)">DB</button>
    </div>
  </div>

  <div class="stats-bar" id="stats">Mostrando <span id="count">16</span> puertos</div>

  <div class="port-grid" id="grid"></div>
</main>

<footer>
  <p>Pwned Notes · <a href="index.html">← volver al índice</a> · Referencias: <a href="https://book.hacktricks.xyz" target="_blank">HackTricks</a> · <a href="https://gtfobins.github.io" target="_blank">GTFOBins</a></p>
</footer>

<script>

  {

      {

    cats: ['lin','win'],
    tags: [{t:'Zone Transfer',c:'r'},{t:'Subdomain enum',c:'b'}],

        raw: `dig axfr @<IP> dominio.htb\nhost -l dominio.htb <IP>`,

      {

        raw: `dig @<IP> dominio.htb ANY\ndig @<IP> -x <IP_victima>`,
        html: `dig <span class="vl">@&lt;IP&gt;</span> dominio.htb ANY\ndig <span class="vl">@&lt;IP&gt;</span> -x &lt;IP_victima&gt;`

  {
    port: '80 / 443', proto: 'TCP', name: 'HTTP / HTTPS',
    cats: ['web'],
    tags: [{t:'Dir enum',c:'p'},{t:'SQLi',c:'r'},{t:'LFI/RFI',c:'r'},{t:'Upload',c:'a'}],
    attacks: [
      'Fuzzing de directorios, extensiones y virtual hosts',
      'SQL Injection en formularios y parámetros GET/POST',
      'LFI / Path Traversal en parámetros de fichero',
      'File upload bypass para subir webshell'
    ],
    cmds: [

      },
      {
        label: 'Brute force panel admin',
        raw: `hydra -l admin -P rockyou.txt http-post-form://<IP>:8080/login:"user=^USER^&pass=^PASS^:Invalid"`,
        html: `hydra <span class="fl">-l</span> <span class="vl">admin</span> <span class="fl">-P</span> rockyou.txt http-post-form://&lt;IP&gt;:8080/login:<span class="vl">"user=^USER^&amp;pass=^PASS^:Invalid"</span>`
      }
    ],
    note: 'Tomcat default creds: tomcat:tomcat, admin:admin. Jenkins sin auth en /script → RCE directo sin credenciales.'
  }
];

const tagColors = {
  r: 'ptag-r', g: 'ptag-g', a: 'ptag-a', b: 'ptag-b', p: 'ptag-p'
};

let activeFilter = 'all';
let searchQuery = '';

function getFiltered() {
  return PORTS.filter(p => {
    const matchCat = activeFilter === 'all' || p.cats.includes(activeFilter);
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      p.port.includes(q) ||
      p.name.toLowerCase().includes(q) ||
      p.proto.toLowerCase().includes(q) ||
      p.attacks.some(a => a.toLowerCase().includes(q)) ||
      p.tags.some(t => t.t.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = getFiltered();
  document.getElementById('count').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">Sin resultados para "' + searchQuery + '"</div>';
    return;
  }

  grid.innerHTML = filtered.map((p, i) => `
    <div class="port-card" id="card-${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <div class="port-badge">${p.port}</div>
        <div class="card-header-info">
          <div class="card-header-title">
            <span class="port-name">${p.name}</span>
            <span class="port-proto">${p.proto}</span>
          </div>
          <div class="port-tags">
            ${p.tags.map(t => `<span class="ptag ${tagColors[t.c]}">${t.t}</span>`).join('')}
          </div>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="card-body">
        <div class="atk-title">Vectores de ataque</div>
        ${p.attacks.map(a => `
          <div class="atk-item">
            <div class="atk-dot"></div>
            <span>${a}</span>
          </div>
        `).join('')}
        ${p.cmds.map((cmd, ci) => `
          <div class="cmd-block">
            <div class="cmd-header">
              <div class="cmd-dots"><span></span><span></span><span></span></div>
              <span class="cmd-label-text">${cmd.label}</span>
              <button class="copy-btn" onclick="copyRaw(this, ${i}, ${ci})">copiar</button>
            </div>
            <pre>${cmd.html}</pre>
          </div>
        `).join('')}
        ${p.note ? `<div class="note-box">💡 ${p.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('expanded');
}

function doFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  btn.classList.add('active-' + cat);
  renderGrid();
}

function doSearch(val) {
  searchQuery = val;
  renderGrid();
}

function copyRaw(btn, portIdx, cmdIdx) {
  const filtered = getFiltered();
  const port = filtered[portIdx];
  if (!port) return;
  const raw = port.cmds[cmdIdx].raw;
  navigator.clipboard.writeText(raw).catch(() => {});
  btn.textContent = '✓ ok';
  setTimeout(() => btn.textContent = 'copiar', 1500);
}

renderGrid();
</script>
</body>
</html>
